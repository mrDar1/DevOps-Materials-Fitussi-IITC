<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #00ff88;
      --accent-dim: rgba(0,255,136,0.12);
      --text: #e8e8e8;
      --muted: #666;
      --red: #ff4d4d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text); }

    #source-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: all 0.3s;
      white-space: nowrap;
    }

    #source-badge.cache {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    #source-badge.db {
      border-color: #4d9fff;
      color: #4d9fff;
      background: rgba(77,159,255,0.1);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-title {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .card-name {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.3;
    }

    .card-price {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .card-stock {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card-stock.low { color: #ffaa00; }
    .card-stock.out { color: var(--red); }

    .buy-btn {
      margin-top: auto;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .buy-btn:hover:not(:disabled) { opacity: 0.85; }
    .buy-btn:active:not(:disabled) { transform: scale(0.97); }
    .buy-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Skeleton */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .skel {
      background: linear-gradient(90deg, var(--surface2) 25%, #252525 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 999;
      pointer-events: none;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      font-family: 'Space Mono', monospace;
      animation: slideUp 0.3s ease, fadeOut 0.4s ease 2.6s forwards;
      pointer-events: auto;
      white-space: nowrap;
    }

    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--red);    color: var(--red); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-8px); }
    }

    /* Error banner */
    #error-banner {
      background: rgba(255,77,77,0.1);
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      display: none;
    }

    #error-banner h2 { color: var(--red); font-family: 'Space Mono', monospace; margin-bottom: 0.5rem; }
    #error-banner p  { color: var(--muted); font-size: 0.9rem; }

    .refresh-btn {
      margin-top: 1rem;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: rgba(255,77,77,0.15); }
  </style>
</head>
<body>

<header>
  <div class="logo">Shop<span>Flow</span></div>
</header>

<main>
  <h1 class="page-title">המוצרים שלנו</h1>
  <p class="page-subtitle">לחץ על BUY NOW כדי לעדכן מלאי</p>

  <div id="error-banner">
    <h2>Backend לא מגיב</h2>
    <p>וודא שה-backend רץ על <code>/api/products</code></p>
    <button class="refresh-btn" onclick="loadProducts()">נסה שוב</button>
  </div>

  <div class="products-grid" id="grid"></div>
</main>

<div id="toast-container"></div>

<script>
  const ICONS = ['💻', '🖱️', '🔌', '⌨️', '🖥️', '📦', '🎧', '📱'];

  function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3100);
  }

  function renderSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = Array(5).fill(0).map(() => `
      <div class="skeleton">
        <div class="skel" style="height:40px;width:50px"></div>
        <div class="skel" style="height:18px;width:80%"></div>
        <div class="skel" style="height:24px;width:50%"></div>
        <div class="skel" style="height:14px;width:40%"></div>
        <div class="skel" style="height:38px;margin-top:8px"></div>
      </div>
    `).join('');
  }

  function renderProducts(products) {
    const grid = document.getElementById('grid');
    grid.innerHTML = products.map((p, i) => {
      const stockClass = p.stock === 0 ? 'out' : p.stock < 10 ? 'low' : '';
      const stockLabel = p.stock === 0 ? 'אזל מהמלאי' : p.stock < 10 ? `⚠️ נותרו ${p.stock}` : `במלאי: ${p.stock}`;
      return `
        <div class="card" id="card-${p.id}">
          <div class="card-icon">${ICONS[i % ICONS.length]}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price">$${parseFloat(p.price).toFixed(2)}</div>
          <div class="card-stock ${stockClass}">${stockLabel}</div>
          <button class="buy-btn" onclick="buy(${p.id})" ${p.stock === 0 ? 'disabled' : ''}>
            BUY NOW
          </button>
        </div>
      `;
    }).join('');
  }

  async function loadProducts() {
    document.getElementById('error-banner').style.display = 'none';
    renderSkeletons();

    try {
      const res = await fetch('/api/products');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderProducts(data);
    } catch (err) {
      document.getElementById('grid').innerHTML = '';
      document.getElementById('error-banner').style.display = 'block';
      showToast('שגיאה: לא ניתן לטעון מוצרים', 'error');
    }
  }

  async function buy(id) {
    const btn = document.querySelector(`#card-${id} .buy-btn`);
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch(`/api/products/${id}/stock`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ delta: -1 }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const product = await res.json();
      showToast(`✓ רכשת ${product.name}! מלאי חדש: ${product.stock}`);
      await loadProducts();
    } catch {
      showToast('שגיאה ברכישה – נסה שוב', 'error');
      btn.disabled = false;
      btn.textContent = 'BUY NOW';
    }
  }

  loadProducts();
</script>
</body>
</html>
