version: "3.9"

networks:
  frontend-net:
  backend-net:

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: shopflow-postgres
    networks: [backend-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: production
    container_name: shopflow-backend
    networks: [backend-net]
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopflow
      DB_USER: shopuser
      DB_PASSWORD: shoppass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: shopflow-frontend
    networks: [frontend-net, backend-net]
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
