version: "3.9"

networks:
  backend-net:

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:17
    container_name: shopflow-postgres
    networks: [backend-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: company
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d company"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: production
    container_name: shopflow-backend
    networks: [backend-net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: company
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
