version: "3.9"

networks:
  backend-net:

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: shopflow-postgres
    networks: [backend-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: builder
    container_name: shopflow-backend
    networks: [backend-net]
    command: npm run start:dev
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopflow
      DB_USER: shopuser
      DB_PASSWORD: shoppass
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: shopflow-frontend
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
