apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fifaapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/FifaApp-infra
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: fifaapp
  syncPolicy:
    automated:
      prune: true    # delete cluster resources when their manifest is removed from git
      selfHeal: true # revert manual kubectl changes — git always wins
    syncOptions:
      - CreateNamespace=true
