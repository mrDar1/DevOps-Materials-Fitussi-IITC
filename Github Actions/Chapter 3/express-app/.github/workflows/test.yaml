name: Test Project

# on: push
# on: [push, workflow_dispatch]
on: 
  push:
    branches:
      - main
    paths:
      - "src/**" # this will trigger the workflow only if changes are made in the src directory
      - "!docs/**" # this will prevent the workflow from triggering if changes are made in the docs directory
  
  pull_request:
    branches: [main]
    types: [opened, closed]
      

jobs:
    test:
        runs-on: ubuntu-latest
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                ref: main
                # ref: dev
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test