name: Deploy to ASG

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          MONGODB_URI: mongodb://localhost:27017/student-api-test
        run: npm test

  build-and-push:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/student-api"
          docker build \
            --build-arg COMMIT_SHA="${{ github.sha }}" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy via SSM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync MongoDB URI to SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name /student-api/mongodb/uri \
            --value "${{ secrets.MONGODB_URI }}" \
            --type SecureString \
            --overwrite \
            --region "$AWS_REGION"

      - name: Deploy to ASG instances via SSM
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/student-api:${{ github.sha }}"
          SHA="${{ github.sha }}"
          REGION="$AWS_REGION"

          # Get instance IDs now — use same set for both send and wait to avoid race condition
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ secrets.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No in-service instances found in ASG"
            exit 1
          fi

          echo "Targeting instances: $INSTANCE_IDS"

          PARAMS=$(jq -cn \
            --arg region "$REGION" \
            --arg image "$IMAGE" \
            --arg name "student-api" \
            --arg sha "$SHA" \
            '{commands: [
              "set -e",
              "for i in $(seq 1 30); do /usr/local/bin/aws --version >/dev/null 2>&1 && break; echo \"Waiting for AWS CLI... $i/30\"; sleep 10; done",
              "export PATH=$PATH:/usr/local/bin",
              "for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; echo \"Waiting for Docker... $i/30\"; sleep 10; done",
              "DH_USER=$(aws ssm get-parameter --region \($region) --name /student-api/dockerhub/username --query Parameter.Value --output text)",
              "DH_TOKEN=$(aws ssm get-parameter --region \($region) --name /student-api/dockerhub/token --with-decryption --query Parameter.Value --output text)",
              "MONGO_URI=$(aws ssm get-parameter --region \($region) --name /student-api/mongodb/uri --with-decryption --query Parameter.Value --output text)",
              "echo \"$DH_TOKEN\" | docker login --username \"$DH_USER\" --password-stdin",
              "docker pull \($image)",
              "docker stop \($name) 2>/dev/null || true",
              "docker rm \($name) 2>/dev/null || true",
              "docker run -d --name \($name) --restart unless-stopped -p 3000:3000 -e COMMIT_SHA=\($sha) -e MONGODB_URI=\"$MONGO_URI\" \($image)",
              "echo \"Deployed \($image) successfully\""
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command dispatched: $COMMAND_ID"

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for instance $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"
            echo "Instance $INSTANCE_ID: deployment complete"
          done

      - name: Health check via ALB
        run: |
          echo "Waiting for ALB health checks to pass..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.ALB_DNS_NAME }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthy at: http://${{ secrets.ALB_DNS_NAME }}"
              echo "Version endpoint: http://${{ secrets.ALB_DNS_NAME }}/version"
              exit 0
            fi
            echo "Attempt $i/18 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check timed out after 3 minutes"
          exit 1
