name: Test Project

on:
  push:
    branches:
      - main
      - dev

jobs:
  live-e2e:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: TEST
      PORT: "3000"
      # NOTE: credentials hardcoded by request — public repo. Rotate after use.
      MONGO_USER: ro_user
      MONGO_PASS: oJyJGwv86BX01boP
      MONGO_HOST: cluster0.82afdwe.mongodb.net
      MONGO_DB: express-app
      # Runner has working public DNS; skip the hardcoded ISP resolvers
      # so the Atlas mongodb+srv:// SRV lookup succeeds.
      SKIP_DNS_OVERRIDE: "1"
      E2E_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server (background)
        run: |
          npm start > server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server
        run: npx --yes wait-on "http://127.0.0.1:${PORT}/livez" --timeout 60000

      - name: Run live e2e tests
        run: npm run test:e2e

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" || true

      - name: Server log (on failure)
        if: failure()
        run: cat server.log
